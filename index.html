<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ஏழூர்</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" sizes="512x512" href="assets/images/favicon.svg">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tamil Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         NAVBAR
    ========================== -->

   <nav class="navbar custom-navbar shadow-sm">

    <div class="container justify-content-center">

        <!-- Center Logo -->
        <a class="navbar-brand m-0" href="#">

            <img src="assets/images/logo.png"
                alt="ஏழூர் Logo"
                class="logo-img">

        </a>

    </div>

</nav>


    <!-- =========================
         HERO SECTION
    ========================== -->

    <section class="hero-section text-center">

        <div class="container">

            <h1 class="hero-title">
                அடுத்த பேருந்து தகவல்
            </h1>

            <p class="hero-text">
                ஏழூர் மக்களுக்கான நேரடி பேருந்து தகவல்
            </p>

        </div>

    </section>


    <!-- =========================
         BUS CARDS
    ========================== -->

   <section class="container py-4">

    <div class="row g-4 justify-content-center">

        <!-- CARD 1 -->

        <div class="col-12 col-md-6">

            <div class="bus-card">

                <!-- Top Row -->

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h5 class="m-0 next-bus-text">
                        Next Bus In
                    </h5>

                    <div class="countdown">
                        10 mins
                    </div>

                </div>

                <!-- Bottom Row -->

                <div class="d-flex justify-content-between align-items-center">

                    <div class="bus-number">
                        3B
                    </div>

                    <p class="route-text m-0">
                        Gobi → Sathy
                    </p>

                </div>

            </div>

        </div>


        <!-- CARD 2 -->

        <div class="col-12 col-md-6">

            <div class="bus-card">

                <!-- Top Row -->

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h5 class="m-0 next-bus-text">
                        Next Bus In
                    </h5>

                    <div class="countdown">
                        15 mins
                    </div>

                </div>

                <!-- Bottom Row -->

                <div class="d-flex justify-content-between align-items-center">

                    <div class="bus-number">
                        S2
                    </div>

                    <p class="route-text m-0">
                        Sathy → Gobi
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>


    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="footer">

        <div class="container">

            © 2026 ஏழூர் Bus Timing Website

        </div>

    </footer>

<script src="js/bus-data.js"></script>
<script src="js/script.js"></script>
    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
